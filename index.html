<!DOCTYPE html>
<html>
  <title>
    student registration form
  </title>
</html>
<body>
  <center>
    <img src="7694d5ed6f6b9be1780e960e9e56eab9.jpg"" alt="student registration form" width="400" height="300">

  <h1>
    Registration Form
  </h1>
  </center>
  <form>
  <label style="border: 3px solid black; padding: 5px;" for="name">Name:</label>
  <input type="text" name="name"><br><br><br><br>


  <label style="border: 3px solid black; padding: 5px;" for="email">Email:</label>
  <input type="email" name="email"><br><br><br><br>

  <label style="border: 3px solid black; padding: 5px;" for="dob">Date of Birth:</label>
  <input type="date" name="dob"><br><br><br><br>

  <label style="border: 3px solid black; padding: 5px;" for="gender">Gender:</label>
  <select name="gender">
    <option value="male">Male</option>
    <option value="female">Female</option>
    </select><br><br><br><br>


    <select style="border: 3px solid black; padding: 5px;" name="course">
      <option value="computer science">Computer Science</option>
      <option value="IT">IT</option>
      <option value="BIT">BIT</option>
      <option value="Data Science">Data Science</option>
    </select><br><br><br><br>

    <label style="border: 3px solid black; padding: 5px;">Hobbies:</label><br><br>
    <input type="checkbox" name="hobbies" value="reading"> Reading
    <input type="checkbox" name="hobbies" value="traveling"> Traveling
    <input type="checkbox" name="hobbies" value="sports"> Sports
    <br><br><br><br>


    <input style="border: 3px solid black; padding: 5px;background-color: blue;" type="submit" value="submit">
    <input style=" border: 3px solid black; padding: 5px;background-color: aquamarine;" type="reset" value="reset">

</body>
